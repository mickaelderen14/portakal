<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628">
  <defs>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>

    <filter id="glow-orange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#f97316" flood-opacity="0.5"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#06b6d4" flood-opacity="0.45"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#a78bfa" flood-opacity="0.4"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glow-emerald" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#34d399" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <radialGradient id="ambientOrange" cx="0.05" cy="0.25" r="0.35">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientCyan" cx="0.95" cy="0.15" r="0.35">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientPurple" cx="0.05" cy="0.85" r="0.35">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientEmerald" cx="0.95" cy="0.85" r="0.35">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="centerBackdrop" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#06070b" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#06070b" stop-opacity="0.88"/>
      <stop offset="80%" stop-color="#06070b" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06070b" stop-opacity="0"/>
    </radialGradient>

    <pattern id="dotGrid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.6" fill="#334155" opacity="0.35"/>
    </pattern>

    <radialGradient id="vignetteGrad" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#06070b"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="628" fill="#06070b"/>
  <rect width="1200" height="628" fill="url(#ambientOrange)"/>
  <rect width="1200" height="628" fill="url(#ambientCyan)"/>
  <rect width="1200" height="628" fill="url(#ambientPurple)"/>
  <rect width="1200" height="628" fill="url(#ambientEmerald)"/>
  <rect width="1200" height="628" fill="url(#dotGrid)" opacity="0.4"/>

  <!-- TSC/TSPL label snippet — top left -->
  <g transform="translate(-40, -20) rotate(-12, 120, 160)" filter="url(#glow-orange)" opacity="0.7">
    <text fill="#f97316" font-family="'SF Mono','Fira Code',monospace" font-size="13" opacity="0.8">
      <tspan x="30" y="60">SIZE 40 mm,30 mm</tspan>
      <tspan x="30" y="78">GAP 3 mm,0 mm</tspan>
      <tspan x="30" y="96">CLS</tspan>
      <tspan x="30" y="114">TEXT 10,10,"3",0,2,2,"Hello"</tspan>
      <tspan x="30" y="132">BARCODE 10,50,"128",60,1,0</tspan>
      <tspan x="30" y="150">QRCODE 10,120,M,6,A,0</tspan>
      <tspan x="30" y="168">PRINT 1</tspan>
    </text>
    <text x="120" y="195" text-anchor="middle" fill="#f97316" opacity="0.6" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="bold" letter-spacing="5">TSC/TSPL</text>
  </g>

  <!-- ZPL snippet — top right -->
  <g transform="translate(880, -40) rotate(8, 150, 150)" filter="url(#glow-cyan)" opacity="0.65">
    <text fill="#06b6d4" font-family="'SF Mono','Fira Code',monospace" font-size="13" opacity="0.8">
      <tspan x="30" y="60">^XA</tspan>
      <tspan x="30" y="78">^PW320^LL240</tspan>
      <tspan x="30" y="96">^CI28</tspan>
      <tspan x="30" y="114">^FO50,50^A0N,60,60</tspan>
      <tspan x="30" y="132">^FDHello World^FS</tspan>
      <tspan x="30" y="150">^FO10,120^BQN,2,5</tspan>
      <tspan x="30" y="168">^FDQM,https://...^FS</tspan>
      <tspan x="30" y="186">^XZ</tspan>
    </text>
    <text x="130" y="215" text-anchor="middle" fill="#06b6d4" opacity="0.55" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="bold" letter-spacing="5">ZPL II</text>
  </g>

  <!-- EPL snippet — bottom left -->
  <g transform="translate(-30, 400) rotate(6, 120, 100)" filter="url(#glow-purple)" opacity="0.6">
    <text fill="#a78bfa" font-family="'SF Mono','Fira Code',monospace" font-size="13" opacity="0.8">
      <tspan x="30" y="30">N</tspan>
      <tspan x="30" y="48">q320</tspan>
      <tspan x="30" y="66">A10,20,0,3,2,2,N,"Hello"</tspan>
      <tspan x="30" y="84">B10,50,0,0,2,4,60,B,"123"</tspan>
      <tspan x="30" y="102">b10,100,0,Q,2,6,"data"</tspan>
      <tspan x="30" y="120">P1</tspan>
    </text>
    <text x="130" y="148" text-anchor="middle" fill="#a78bfa" opacity="0.5" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="bold" letter-spacing="5">EPL2</text>
  </g>

  <!-- ESC/POS hex — bottom right -->
  <g transform="translate(880, 420) rotate(-6, 150, 100)" filter="url(#glow-emerald)" opacity="0.55">
    <text fill="#34d399" font-family="'SF Mono','Fira Code',monospace" font-size="13" opacity="0.8">
      <tspan x="30" y="30">1B 40</tspan>
      <tspan x="30" y="48">1B 61 01</tspan>
      <tspan x="30" y="66">1B 45 01  Hello</tspan>
      <tspan x="30" y="84">1D 6B 49 06  123456</tspan>
      <tspan x="30" y="102">1D 28 6B ... QR</tspan>
      <tspan x="30" y="120">1D 76 30 ... IMG</tspan>
    </text>
    <text x="130" y="148" text-anchor="middle" fill="#34d399" opacity="0.5" font-family="'SF Mono','Fira Code',monospace" font-size="14" font-weight="bold" letter-spacing="5">ESC/POS</text>
  </g>

  <!-- Center dark backdrop -->
  <rect width="1200" height="628" fill="url(#centerBackdrop)"/>

  <!-- "portakal" wordmark -->
  <text x="600" y="260" text-anchor="middle" fill="#f8fafc" font-family="'Georgia','Playfair Display','Times New Roman',serif" font-size="140" font-weight="bold" letter-spacing="-3" opacity="0.97">portakal</text>

  <!-- Thin rule -->
  <line x1="300" y1="286" x2="900" y2="286" stroke="#475569" stroke-width="1" opacity="0.5"/>

  <!-- Tagline -->
  <text x="600" y="326" text-anchor="middle" fill="#cbd5e1" font-family="'SF Mono','Fira Code','Menlo',monospace" font-size="18" letter-spacing="5">UNIVERSAL PRINTER LANGUAGE SDK</text>

  <!-- Feature pills -->
  <g font-family="'SF Mono','Fira Code','Menlo',monospace" font-size="13" letter-spacing="1.5">
    <g transform="translate(184, 356)">
      <rect x="0" y="0" width="164" height="38" rx="19" fill="#f9731610" stroke="#f97316" stroke-width="1.3" opacity="0.7"/>
      <text x="82" y="25" text-anchor="middle" fill="#f97316" opacity="0.95">0 DEPENDENCIES</text>
    </g>
    <g transform="translate(364, 356)">
      <rect x="0" y="0" width="120" height="38" rx="19" fill="#06b6d410" stroke="#06b6d4" stroke-width="1.3" opacity="0.7"/>
      <text x="60" y="25" text-anchor="middle" fill="#06b6d4" opacity="0.95">PURE ESM</text>
    </g>
    <g transform="translate(500, 356)">
      <rect x="0" y="0" width="140" height="38" rx="19" fill="#a78bfa10" stroke="#a78bfa" stroke-width="1.3" opacity="0.7"/>
      <text x="70" y="25" text-anchor="middle" fill="#a78bfa" opacity="0.95">TYPESCRIPT</text>
    </g>
    <g transform="translate(656, 356)">
      <rect x="0" y="0" width="160" height="38" rx="19" fill="#34d39910" stroke="#34d399" stroke-width="1.3" opacity="0.7"/>
      <text x="80" y="25" text-anchor="middle" fill="#34d399" opacity="0.95">9 LANGUAGES</text>
    </g>
    <g transform="translate(832, 356)">
      <rect x="0" y="0" width="168" height="38" rx="19" fill="#fb718510" stroke="#fb7185" stroke-width="1.3" opacity="0.7"/>
      <text x="84" y="25" text-anchor="middle" fill="#fb7185" opacity="0.95">EVERY PRINTER</text>
    </g>
  </g>

  <!-- Printer languages list -->
  <text x="600" y="432" text-anchor="middle" fill="#94a3b8" font-family="'SF Mono','Fira Code',monospace" font-size="13" letter-spacing="2.5">TSC · ZPL · EPL · ESC/POS · CPCL · DPL · IPL · SBPL · STAR PRNT</text>

  <!-- npm install badge -->
  <g transform="translate(480, 460)">
    <rect x="0" y="0" width="240" height="40" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="1.2"/>
    <text x="20" y="26" fill="#64748b" font-family="'SF Mono','Fira Code',monospace" font-size="16">$</text>
    <text x="38" y="26" fill="#94a3b8" font-family="'SF Mono','Fira Code',monospace" font-size="16"> npm i </text>
    <text x="118" y="26" fill="#f8fafc" font-family="'SF Mono','Fira Code',monospace" font-size="16" font-weight="bold">portakal</text>
  </g>

  <!-- GitHub link -->
  <text x="600" y="556" text-anchor="middle" fill="#64748b" font-family="'SF Mono','Fira Code',monospace" font-size="13" letter-spacing="1.5">github.com/productdevbook/portakal</text>

  <!-- Grain overlay -->
  <rect width="1200" height="628" filter="url(#grain)" opacity="0.2"/>

  <!-- Vignette -->
  <rect width="1200" height="628" fill="url(#vignetteGrad)" opacity="0.45"/>
</svg>
